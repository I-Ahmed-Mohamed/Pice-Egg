<script>
function fitScale(){
  var wrap = document.getElementById('scaleWrap');
  var sheet = document.getElementById('sheet');
  var w = wrap.clientWidth;
  var scale = Math.min(1, w/1402);
  sheet.style.transform = 'scale(' + scale + ')';
  wrap.style.height = (1122*scale) + 'px';
}
window.addEventListener('resize', fitScale);
window.addEventListener('load', fitScale);
setTimeout(fitScale, 100);

document.getElementById('todayBtn').addEventListener('click', function(){
  var d = new Date();
  document.getElementById('f_day').value = d.getDate();
  document.getElementById('f_month').value = (d.getMonth()+1);
  document.getElementById('f_year').value = d.getFullYear();
});

document.getElementById('clearBtn').addEventListener('click', function(){
  document.querySelectorAll('.cell').forEach(function(el){ el.value=''; });
});

document.getElementById('downloadBtn').addEventListener('click', function(){
  var img = document.getElementById('baseImg');
  var canvas = document.createElement('canvas');
  canvas.width = 1402;
  canvas.height = 1122;
  var ctx = canvas.getContext('2d');

  function drawAll(){
    ctx.drawImage(img, 0, 0, 1402, 1122);
    document.querySelectorAll('.cell').forEach(function(el){
      var val = el.value.trim();
      if(!val) return;
      var left = parseInt(el.style.left);
      var top = parseInt(el.style.top);
      var w = parseInt(el.style.width);
      var h = parseInt(el.style.height);
      var fontSize = parseInt(el.style.fontSize) || 26;
      ctx.font = 'bold ' + fontSize + 'px Tahoma, Arial, sans-serif';
      ctx.fillStyle = '#3a2517';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(val, left + w/2, top + h/2);
    });
    document.querySelectorAll('.v-line').forEach(function(el){
      var left = parseInt(el.style.left);
      var top = parseInt(el.style.top);
      var w = parseInt(el.style.width);
      var h = parseInt(el.style.height);
      ctx.fillStyle = el.style.backgroundColor || '#4a2f22';
      ctx.fillRect(left, top, w, h);
    });
    var link = document.createElement('a');
    link.download = 'اسعار_البيض.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  if(img.complete){
    drawAll();
  } else {
    img.onload = drawAll;
  }
});
</script>
